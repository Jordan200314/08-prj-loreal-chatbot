<!DOCTYPE html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L'Oréal Chatbot</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet" />

    <!-- Styles -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="page-wrapper">

      <!-- Header -->
      <header class="site-header">
        <img src="img/loreal-logo.png" alt="L'Oréal Logo" class="logo" />
        <h1 class="site-title">Smart Routine & Product Advisor</h1>
      </header>

      <!-- Chat -->
      <main>
        <section class="chatbox">
          <div id="chatWindow" class="chat-window"></div>

          <form id="chatForm" class="chat-form">
            <input
              id="userInput"
              type="text"
              placeholder="Ask me about L’Oréal products or routines…"
              required
            />
            <button type="submit">➤</button>
          </form>
        </section>
      </main>

      <!-- Footer -->
      <footer class="site-footer">
        <p>© 2025 L’Oréal. All rights reserved.</p>
        <nav>
          <a href="#">Privacy Policy</a>
          <a href="#">Terms of Use</a>
          <a href="#">Contact</a>
        </nav>
      </footer>

    </div>

    <script src="script.js"></script>
  </body>
</html>
